tokens:
  gho_test_token_admin:
    login: admin
    scopes: [repo, user, admin:org, admin:repo_hook]
  gho_test_token_octocat:
    login: octocat
    scopes: [repo, user, read:user, "user:email", workflow]

github:
  users:
    - login: octocat
      name: The Octocat
      email: octocat@github.com
      bio: I am the Octocat
      company: GitHub
      location: San Francisco
    - login: developer
      name: Developer
      email: dev@example.com
  orgs:
    - login: my-org
      name: My Organization
      description: A test organization
  repos:
    - owner: octocat
      name: hello-world
      description: My first repository
      language: JavaScript
      topics: [hello, world]
      auto_init: true
    - owner: my-org
      name: org-repo
      description: An organization repository
      language: TypeScript
      auto_init: true
  oauth_apps:
    - client_id: emu_github_client_id
      client_secret: emu_github_client_secret
      name: Code App
      redirect_uris:
        - http://localhost:3000/api/auth/callback/github

vercel:
  users:
    - username: developer
      name: Developer
      email: dev@example.com
  teams:
    - slug: my-team
      name: My Team
  projects:
    - name: my-app
      team: my-team
      framework: nextjs
  integrations:
    - client_id: emu_vercel_client_id
      client_secret: emu_vercel_client_secret
      name: Code App (Vercel)
      redirect_uris:
        - http://localhost:3000/api/auth/callback/vercel

google:
  users:
    - email: testuser@gmail.com
